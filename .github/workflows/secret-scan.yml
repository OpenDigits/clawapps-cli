name: Secret scan

# Cloud-side enforcement that mirrors the local pre-commit hook.
# Catches developers who skipped `pre-commit install` and any sneaky
# fixture file that slipped past the .gitignore.
#
# Runs on every PR + push. Failing this blocks merge.

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  gitleaks:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # full history so gitleaks can scan past commits too

      - name: gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_CONFIG: ${{ github.workspace }}/.gitleaks.toml
